<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo Giá Pro - Phương Thanh Composite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .a4-page { 
            width: 210mm; min-height: 297mm; padding: 15mm; 
            margin: 20px auto; background: white; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); 
        }
        @media print { .no-print { display: none !important; } .a4-page { margin: 0; box-shadow: none; width: 100%; } }
        @media (max-width: 210mm) { .a4-page { width: 95%; padding: 10mm; margin: 10px auto; } }
        .input-focus:focus { border-color: #2563eb; ring: 2px; ring-color: #dbeafe; outline: none; }
    </style>
</head>
<body class="text-slate-800">

    <nav class="bg-indigo-900 text-white p-4 sticky top-0 z-50 shadow-lg no-print">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-white p-1.5 rounded-lg">
                    <i class="fa-solid fa-file-invoice-dollar text-indigo-900 text-xl"></i>
                </div>
                <span class="font-bold tracking-tight text-lg hidden sm:inline">PHƯƠNG THANH COMPOSITE</span>
            </div>
            <div class="flex gap-2">
                <button onclick="showSettings()" class="bg-indigo-800/50 hover:bg-indigo-700 px-3 py-2 rounded-lg text-sm font-semibold transition-all">
                    <i class="fa-solid fa-gear mr-1"></i> Cài đặt
                </button>
                <button onclick="toggleView('edit')" id="btn-back" class="hidden bg-slate-600 hover:bg-slate-500 px-4 py-2 rounded-lg text-sm font-bold uppercase transition-all">
                    <i class="fa-solid fa-arrow-left mr-1"></i> Quay lại
                </button>
                <button onclick="toggleView('preview')" id="btn-go-preview" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-lg text-sm font-bold uppercase shadow-lg shadow-emerald-900/20 transition-all active:scale-95">
                    <i class="fa-solid fa-eye mr-1"></i> Xem & Xuất PDF
                </button>
            </div>
        </div>
    </nav>

    <div id="edit-mode" class="max-w-4xl mx-auto p-4 space-y-6 no-print animate-in fade-in duration-500">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="bg-slate-50 px-5 py-3 border-b border-slate-200 flex items-center gap-2">
                <i class="fa-solid fa-user-tie text-indigo-600"></i>
                <h3 class="font-bold text-slate-700 uppercase text-xs tracking-wider">Thông tin khách hàng</h3>
            </div>
            <div class="p-5 grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Tên khách hàng</label>
                    <input type="text" id="cust-name" placeholder="Ví dụ: Anh Thành - Rạch Giá" class="w-full border border-slate-200 p-2.5 rounded-xl font-bold uppercase text-slate-700 bg-slate-50 focus:bg-white transition-all input-focus">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Ngày lập</label>
                    <input type="date" id="quote-date" class="w-full border border-slate-200 p-2.5 rounded-xl text-slate-700 bg-slate-50 focus:bg-white transition-all input-focus">
                </div>
                <div class="md:col-span-2 space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Địa chỉ</label>
                    <input type="text" id="cust-addr" placeholder="Nhập địa chỉ..." class="w-full border border-slate-200 p-2.5 rounded-xl text-slate-700 bg-slate-50 focus:bg-white transition-all input-focus">
                </div>
                <div class="md:col-span-2 space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">SĐT / Mã số thuế</label>
                    <input type="text" id="cust-phone" placeholder="Nhập số điện thoại..." class="w-full border border-slate-200 p-2.5 rounded-xl text-slate-700 bg-slate-50 focus:bg-white transition-all input-focus">
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="bg-slate-50 px-5 py-3 border-b border-slate-200 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-box-archive text-emerald-600"></i>
                    <h3 class="font-bold text-slate-700 uppercase text-xs tracking-wider">Danh sách hàng hóa</h3>
                </div>
                <button onclick="addItem()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded-xl text-xs font-bold transition-all flex items-center gap-1.5 shadow-md shadow-indigo-200">
                    <i class="fa-solid fa-plus"></i> Thêm hàng
                </button>
            </div>
            <div id="items-list" class="p-5 space-y-4"></div>
            
            <div class="bg-indigo-50/50 p-6 border-t border-slate-100 space-y-3">
                <div class="flex justify-between items-center text-sm">
                    <span class="text-slate-500 font-medium">Cộng tiền hàng:</span>
                    <span id="sum-subtotal" class="font-bold text-slate-700 text-lg">0</span>
                </div>
                <div class="flex justify-between items-center text-sm">
                    <div class="flex items-center gap-2">
                        <span class="text-slate-500 font-medium">Chiết khấu (%):</span>
                        <input type="number" id="discount-pct" oninput="calculateAll()" value="0" class="border border-slate-200 w-16 p-1.5 rounded-lg text-center text-red-600 font-bold focus:outline-none focus:ring-2 focus:ring-red-100">
                    </div>
                    <span id="sum-discount-val" class="font-bold text-red-600">-0</span>
                </div>
                <div class="pt-3 border-t border-indigo-100 flex justify-between items-end">
                    <span class="font-black text-indigo-900 text-sm uppercase">Tổng cộng thanh toán</span>
                    <div class="text-right">
                        <span id="sum-total" class="text-3xl font-black text-indigo-700 leading-none">0</span>
                        <span class="text-indigo-700 font-bold ml-1">VNĐ</span>
                    </div>
                </div>
                <p id="sum-words" class="text-[11px] italic text-slate-400 text-right"></p>
            </div>
        </div>
    </div>

    <div id="preview-mode" class="hidden bg-slate-200 py-10 min-h-screen">
        <div class="max-w-4xl mx-auto mb-6 flex gap-4 px-4 no-print">
            <button onclick="exportPDF()" class="flex-1 bg-red-600 hover:bg-red-700 text-white py-4 rounded-2xl font-bold shadow-xl flex flex-col items-center justify-center gap-1 transition-all">
                <i class="fa-solid fa-file-pdf text-xl"></i>
                <span class="text-sm">XUẤT FILE PDF</span>
            </button>
            <button onclick="window.print()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-bold shadow-xl flex flex-col items-center justify-center gap-1 transition-all">
                <i class="fa-solid fa-print text-xl"></i>
                <span class="text-sm">IN TRỰC TIẾP</span>
            </button>
        </div>
        <div id="preview-a4" class="a4-page mx-auto">
            <div id="preview-content"></div>
        </div>
    </div>

    <div id="modal-settings" class="fixed inset-0 bg-slate-900/60 hidden z-[100] flex items-center justify-center p-4 no-print backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden border border-white">
            <div class="bg-indigo-900 text-white p-5 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-screwdriver-wrench"></i>
                    <span class="font-bold uppercase text-sm tracking-widest">Cấu hình hệ thống</span>
                </div>
                <button onclick="closeSettings()" class="text-2xl hover:rotate-90 transition-all">&times;</button>
            </div>
            <div class="p-6 space-y-4 max-h-[75vh] overflow-y-auto bg-slate-50">
                <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm space-y-3">
                    <label class="block text-[10px] font-black text-indigo-400 uppercase">Logo Công ty (Dạng ảnh)</label>
                    <input type="file" id="set-logo" accept="image/*" onchange="uploadLogo(this)" class="text-xs w-full file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer">
                    <div id="logo-preview-container" class="mt-2 hidden border rounded-lg p-2 flex justify-center bg-slate-50">
                        <img id="logo-preview-img" src="" class="max-h-20">
                    </div>
                </div>

                <div class="space-y-3">
                    <input type="text" id="set-name" placeholder="Tên Công Ty" class="w-full border p-3 rounded-xl text-sm font-bold uppercase shadow-sm">
                    <input type="text" id="set-tax" placeholder="Mã số thuế" class="w-full border p-3 rounded-xl text-sm shadow-sm">
                    <input type="text" id="set-addr" placeholder="Địa chỉ trụ sở" class="w-full border p-3 rounded-xl text-sm shadow-sm">
                    <input type="text" id="set-phone" placeholder="Số điện thoại" class="w-full border p-3 rounded-xl text-sm shadow-sm">
                    <div class="bg-indigo-50 p-4 rounded-2xl border border-indigo-100 space-y-3">
                        <label class="block text-[10px] font-bold uppercase text-indigo-700">Tài khoản Ngân hàng</label>
                        <textarea id="set-bank" rows="2" placeholder="Tên ngân hàng - Chi nhánh" class="w-full border border-indigo-200 p-2 rounded-xl text-sm"></textarea>
                        <input type="text" id="set-stk" placeholder="Số tài khoản" class="w-full border border-indigo-200 p-2 rounded-xl text-sm font-bold text-indigo-900">
                    </div>
                    <input type="text" id="set-director" placeholder="Họ tên Giám đốc" class="w-full border p-3 rounded-xl text-sm shadow-sm">
                    <div class="flex justify-between items-center bg-amber-50 p-4 rounded-2xl border border-amber-100">
                        <span class="text-xs font-bold text-amber-700 uppercase">Thuế VAT (%) mặc định:</span>
                        <input type="number" id="set-vat" class="border border-amber-200 p-2 w-20 rounded-xl text-center font-bold text-amber-700 outline-none">
                    </div>
                </div>
            </div>
            <div class="p-4 bg-white text-right border-t border-slate-100">
                <button onclick="saveSettings()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-10 py-3 rounded-2xl font-bold shadow-lg shadow-indigo-200 transition-all active:scale-95">
                    <i class="fa-solid fa-check mr-1"></i> LƯU THAY ĐỔI
                </button>
            </div>
        </div>
    </div>

    <script>
        const CATALOG = [
            { n: "Nhớt động cơ máy 2 thì", u: "Can", p: 525000 },
            { n: "Nhớt động cơ máy 4 thì", u: "Can", p: 683333 },
            { n: "Nhớt động cơ máy 1 lít", u: "Can", p: 270000 },
            { n: "Nhớt hộp số 1 lít", u: "Can", p: 270000 },
            { n: "Nhớt 4 thì - can 4 lít", u: "Can", p: 700000 },
            { n: "Bồn Composite 500L", u: "Cái", p: 1500000 },
            { n: "Công thợ bảo trì/thay nhớt", u: "Công", p: 1200000 }
        ];

        let config = JSON.parse(localStorage.getItem('pt_config')) || {
            name: "CÔNG TY TNHH MTV PHƯƠNG THANH COMPOSITE",
            tax: "1702233007",
            addr: "506A, Ấp Tân Phước, Xã Châu Thành, Tỉnh An Giang",
            phone: "0949.878.208 - 0942.959.263",
            bank: "Ngân hàng MB - Chi nhánh Rạch Giá, An Giang",
            stk: "242666686868",
            director: "Bùi Nhựt Phương",
            vat: 8
        };

        let storedLogo = localStorage.getItem('pt_logo_base64') || "";
        let items = [{ id: 1, name: "Nhớt 4 thì - can 4 lít", unit: "Can", qty: 1, price: 700000 }];

        window.onload = () => {
            document.getElementById('quote-date').value = new Date().toISOString().split('T')[0];
            if(storedLogo) {
                document.getElementById('logo-preview-img').src = storedLogo;
                document.getElementById('logo-preview-container').classList.remove('hidden');
            }
            renderItems();
            calculateAll();
        };

        function uploadLogo(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    storedLogo = e.target.result;
                    document.getElementById('logo-preview-img').src = storedLogo;
                    document.getElementById('logo-preview-container').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        function renderItems() {
            const list = document.getElementById('items-list');
            list.innerHTML = items.map(item => `
                <div class="group border border-slate-200 rounded-2xl p-4 bg-white relative transition-all hover:shadow-md hover:border-indigo-200">
                    <button onclick="removeItem(${item.id})" class="absolute -top-2 -right-2 bg-white text-slate-400 hover:text-red-500 w-8 h-8 rounded-full shadow-sm border border-slate-100 transition-all flex items-center justify-center">
                        <i class="fa-solid fa-xmark text-sm"></i>
                    </button>
                    
                    <div class="flex items-center gap-2 mb-3 bg-slate-50 p-1.5 rounded-xl border border-slate-100">
                        <i class="fa-solid fa-magnifying-glass text-indigo-400 text-[10px] ml-2"></i>
                        <select onchange="applyCatalog(${item.id}, this.value)" class="w-full text-[11px] text-indigo-600 bg-transparent outline-none font-bold uppercase cursor-pointer">
                            <option value="">Chọn từ danh mục hàng mẫu</option>
                            ${CATALOG.map((c, i) => `<option value="${i}">${c.n} (${c.p.toLocaleString()}đ)</option>`).join('')}
                        </select>
                    </div>

                    <input type="text" value="${item.name}" oninput="updateItem(${item.id}, 'name', this.value)" placeholder="Tên hàng hóa..." class="w-full font-bold text-slate-700 bg-transparent outline-none mb-3 px-2 border-b border-transparent focus:border-indigo-200">
                    
                    <div class="grid grid-cols-12 gap-3 px-2">
                        <div class="col-span-3 space-y-1 text-center">
                            <label class="text-[9px] uppercase font-black text-slate-300 block">ĐVT</label>
                            <input type="text" value="${item.unit}" oninput="updateItem(${item.id}, 'unit', this.value)" class="w-full text-center text-xs font-bold text-slate-500 border border-slate-100 rounded-lg p-1.5 bg-slate-50/50">
                        </div>
                        <div class="col-span-3 space-y-1 text-center">
                            <label class="text-[9px] uppercase font-black text-slate-300 block">Số lượng</label>
                            <input type="number" value="${item.qty}" oninput="updateItem(${item.id}, 'qty', this.value)" class="w-full text-center text-sm font-black text-indigo-700 border border-indigo-50 rounded-lg p-1.5 bg-indigo-50/30">
                        </div>
                        <div class="col-span-6 space-y-1 text-right">
                            <label class="text-[9px] uppercase font-black text-slate-300 block mr-2">Đơn giá (đ)</label>
                            <input type="text" value="${item.price.toLocaleString('vi-VN')}" oninput="updatePrice(${item.id}, this.value)" class="w-full text-right text-sm font-bold text-slate-700 border border-amber-50 rounded-lg p-1.5 bg-amber-50/30">
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function applyCatalog(id, idx) {
            if(idx === "") return;
            const i = items.find(x => x.id === id);
            i.name = CATALOG[idx].n; i.unit = CATALOG[idx].u; i.price = CATALOG[idx].p;
            renderItems(); calculateAll();
        }

        function addItem() { items.push({ id: Date.now(), name: "", unit: "Cái", qty: 1, price: 0 }); renderItems(); calculateAll(); }
        function removeItem(id) { if(items.length > 1) { items = items.filter(i => i.id !== id); renderItems(); calculateAll(); } }
        function updateItem(id, f, v) { const i = items.find(x => x.id === id); if(i) { i[f] = (f==='qty') ? (parseInt(v)||0) : v; calculateAll(); } }
        function updatePrice(id, v) { const val = parseInt(v.replace(/\D/g, '')) || 0; const i = items.find(x => x.id === id); if(i) { i.price = val; calculateAll(); } }

        function calculateAll() {
            let sub = items.reduce((s, i) => s + (i.qty * i.price), 0);
            let dPct = parseFloat(document.getElementById('discount-pct').value) || 0;
            let total = sub - Math.round(sub * dPct / 100);
            document.getElementById('sum-subtotal').innerText = sub.toLocaleString() + " đ";
            document.getElementById('sum-discount-val').innerText = "-" + Math.round(sub * dPct / 100).toLocaleString() + " đ";
            document.getElementById('sum-total').innerText = total.toLocaleString();
            document.getElementById('sum-words').innerText = "Bằng chữ: " + docTien(total);
        }

        function toggleView(mode) {
            const isPreview = mode === 'preview';
            if(isPreview) syncPreview();
            document.getElementById('edit-mode').classList.toggle('hidden', isPreview);
            document.getElementById('preview-mode').classList.toggle('hidden', !isPreview);
            document.getElementById('btn-go-preview').classList.toggle('hidden', isPreview);
            document.getElementById('btn-back').classList.toggle('hidden', !isPreview);
            window.scrollTo(0,0);
        }

        function syncPreview() {
            const d = new Date(document.getElementById('quote-date').value);
            const dStr = `Ngày ${d.getDate()} tháng ${d.getMonth()+1} năm ${d.getFullYear()}`;
            let sub = items.reduce((s, i) => s + (i.qty * i.price), 0);
            let dPct = parseFloat(document.getElementById('discount-pct').value) || 0;
            let total = sub - Math.round(sub * dPct / 100);

            document.getElementById('preview-content').innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:start; border-bottom:3px solid #1e1b4b; padding-bottom:15px; margin-bottom:25px;">
                    <div style="width:140px;">
                        ${storedLogo ? `<img src="${storedLogo}" style="max-width:100%; max-height:80px;">` : `<div style="padding:10px; border:2px dashed #ddd; text-align:center; color:#ccc; font-weight:900; border-radius:10px">LOGO</div>`}
                    </div>
                    <div style="text-align:right;">
                        <h2 style="color:#b91c1c; font-size:16px; font-weight:900; text-transform:uppercase; margin:0 0 5px 0;">${config.name}</h2>
                        <div style="font-size:11px; color:#475569; line-height:1.4">
                            <p>Mã số thuế: ${config.tax}</p>
                            <p>Địa chỉ: ${config.addr}</p>
                            <p style="font-weight:bold; color:#1e3a8a; font-size:12px;">Hotline: ${config.phone}</p>
                        </div>
                    </div>
                </div>

                <h1 style="text-align:center; color:#1e3a8a; font-size:26px; font-weight:900; margin-bottom:5px; letter-spacing:1px">BẢNG BÁO GIÁ</h1>
                <p style="text-align:center; font-style:italic; font-size:13px; color:#64748b; margin-bottom:25px;">${dStr}</p>
                
                <div style="margin-bottom:20px; font-size:14px; background-color:#f8fafc; padding:15px; border-radius:12px; border:1px solid #f1f5f9">
                    <p style="margin-bottom:5px"><strong style="color:#1e3a8a">Kính gửi khách hàng:</strong> <span style="text-transform:uppercase; font-weight:900; color:#334155">${document.getElementById('cust-name').value || "..."}</span></p>
                    <p style="margin-bottom:5px"><strong>Địa chỉ:</strong> ${document.getElementById('cust-addr').value || "..."}</p>
                    <p><strong>Số điện thoại:</strong> ${document.getElementById('cust-phone').value || "..."}</p>
                </div>

                <table style="width:100%; border-collapse:collapse; font-size:13px;">
                    <thead>
                        <tr style="background-color:#1e3a8a; color:white;">
                            <th style="border:1px solid #1e3a8a; padding:10px; width:40px;">STT</th>
                            <th style="border:1px solid #1e3a8a; padding:10px; text-align:left;">Tên hàng hóa / Quy cách</th>
                            <th style="border:1px solid #1e3a8a; padding:10px;">ĐVT</th>
                            <th style="border:1px solid #1e3a8a; padding:10px;">SL</th>
                            <th style="border:1px solid #1e3a8a; padding:10px; text-align:right;">Đơn giá</th>
                            <th style="border:1px solid #1e3a8a; padding:10px; text-align:right;">Thành tiền</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${items.map((it, idx) => `
                            <tr>
                                <td style="border:1px solid #e2e8f0; padding:10px; text-align:center; color:#64748b;">${idx+1}</td>
                                <td style="border:1px solid #e2e8f0; padding:10px; font-weight:bold; color:#1e293b;">${it.name}</td>
                                <td style="border:1px solid #e2e8f0; padding:10px; text-align:center;">${it.unit}</td>
                                <td style="border:1px solid #e2e8f0; padding:10px; text-align:center; font-weight:bold;">${it.qty}</td>
                                <td style="border:1px solid #e2e8f0; padding:10px; text-align:right;">${it.price.toLocaleString()}</td>
                                <td style="border:1px solid #e2e8f0; padding:10px; text-align:right; font-weight:bold; color:#1e3a8a;">${(it.qty*it.price).toLocaleString()}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>

                <div style="text-align:right; margin-top:20px; padding:15px; background-color:#fff1f2; border-radius:12px; border:1px solid #ffe4e6">
                    ${dPct > 0 ? `<p style="font-size:12px; color:#e11d48; margin-bottom:5px">Chiết khấu ưu đãi (${dPct}%): -${Math.round(sub*dPct/100).toLocaleString()} VNĐ</p>` : ''}
                    <h3 style="color:#b91c1c; font-size:20px; font-weight:900; margin:0">TỔNG CỘNG THANH TOÁN: ${total.toLocaleString()} VNĐ</h3>
                    <p style="font-style:italic; font-size:11px; color:#9f1239; margin-top:5px;">(Bằng chữ: ${docTien(total)})</p>
                </div>

                <div style="margin-top:30px; font-size:13px; color:#475569; border-left:4px solid #1e3a8a; padding-left:15px">
                    <p style="font-weight:900; text-transform:uppercase; color:#1e3a8a; margin-bottom:8px">Ghi chú & Điều khoản:</p>
                    <p>• Giá trên đã bao gồm <strong>${config.vat}% VAT</strong>.</p>
                    <p>• Thanh toán trước khi nhận hàng. Hiệu lực báo giá: 15 ngày.</p>
                    <p style="font-weight:bold; margin-top:10px; color:#1e293b">Thông tin chuyển khoản:</p>
                    <p>${config.bank} | Chủ TK: <strong>${config.name}</strong></p>
                    <p style="color:#2563eb; font-size:16px; font-weight:900; margin-top:5px">Số tài khoản: ${config.stk}</p>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; margin-top:40px; text-align:center;">
                    <div></div>
                    <div>
                        <p style="font-style:italic; color:#64748b; font-size:12px;">${dStr}</p>
                        <p style="font-weight:900; margin:5px 0 60px 0; color:#1e1b4b; font-size:14px; text-transform:uppercase;">Giám đốc Công ty</p>
                        <p style="font-weight:900; text-decoration:underline; color:#1e1b4b; font-size:15px; text-transform:uppercase;">${config.director}</p>
                    </div>
                </div>
            `;
        }

        function showSettings() {
            document.getElementById('set-name').value = config.name;
            document.getElementById('set-tax').value = config.tax;
            document.getElementById('set-addr').value = config.addr;
            document.getElementById('set-phone').value = config.phone;
            document.getElementById('set-bank').value = config.bank;
            document.getElementById('set-stk').value = config.stk;
            document.getElementById('set-director').value = config.director;
            document.getElementById('set-vat').value = config.vat;
            document.getElementById('modal-settings').classList.remove('hidden');
        }
        function closeSettings() { document.getElementById('modal-settings').classList.add('hidden'); }
        function saveSettings() {
            config = {
                name: document.getElementById('set-name').value, tax: document.getElementById('set-tax').value,
                addr: document.getElementById('set-addr').value, phone: document.getElementById('set-phone').value,
                bank: document.getElementById('set-bank').value, stk: document.getElementById('set-stk').value,
                director: document.getElementById('set-director').value, vat: parseInt(document.getElementById('set-vat').value) || 0
            };
            localStorage.setItem('pt_config', JSON.stringify(config));
            if(storedLogo) localStorage.setItem('pt_logo_base64', storedLogo);
            closeSettings();
        }

        function exportPDF() {
            const docDef = {
                content: [
                    {
                        columns: [
                            storedLogo ? { image: storedLogo, width: 80 } : { text: 'LOGO', width: 80, bold: true, color: '#ccc' },
                            {
                                stack: [
                                    { text: config.name, color: '#b91c1c', bold: true, fontSize: 13 },
                                    { text: `MST: ${config.tax}`, fontSize: 9 },
                                    { text: `ĐC: ${config.addr}`, fontSize: 9 },
                                    { text: `SĐT: ${config.phone}`, color: '#1e3a8a', bold: true, fontSize: 10 },
                                ], alignment: 'right'
                            }
                        ]
                    },
                    { canvas: [{ type: 'line', x1: 0, y1: 5, x2: 515, y2: 5, lineWidth: 2, lineColor: '#1e1b4b' }] },
                    { text: 'BẢNG BÁO GIÁ', alignment: 'center', fontSize: 24, bold: true, color: '#1e3a8a', margin: [0, 20, 0, 10] },
                    { text: `Khách hàng: ${document.getElementById('cust-name').value.toUpperCase()}`, bold: true, margin: [0, 10] },
                    {
                        table: {
                            headerRows: 1, widths: [30, '*', 40, 30, 70, 80],
                            body: [
                                [{text:'STT', fillColor:'#1e3a8a', color:'white', bold:true}, {text:'Hàng hóa', fillColor:'#1e3a8a', color:'white', bold:true}, {text:'ĐVT', fillColor:'#1e3a8a', color:'white', bold:true}, {text:'SL', fillColor:'#1e3a8a', color:'white', bold:true}, {text:'Giá', fillColor:'#1e3a8a', color:'white', bold:true}, {text:'Tổng', fillColor:'#1e3a8a', color:'white', bold:true}],
                                ...items.map((it, idx) => [idx+1, it.name, it.unit, it.qty, it.price.toLocaleString(), (it.qty*it.price).toLocaleString()])
                            ]
                        }
                    },
                    { text: `TỔNG THANH TOÁN: ${document.getElementById('sum-total').innerText} VNĐ`, alignment: 'right', bold: true, color: '#b91c1c', fontSize: 16, margin:[0,15] },
                    { text: `Ghi chú: Giá gồm ${config.vat}% VAT. TK: ${config.stk} - ${config.bank}`, fontSize: 10, italics: true }
                ],
                defaultStyle: { font: 'Roboto' }
            };
            pdfMake.createPdf(docDef).download("Bao_Gia_Phuong_Thanh.pdf");
        }

        function docTien(n) {
            if (n === 0) return "Không đồng";
            const chu = ["không", "một", "hai", "ba", "bốn", "năm", "sáu", "bảy", "tám", "chín"];
            const units = ["", "nghìn", "triệu", "tỷ", "nghìn tỷ", "triệu tỷ"];
            let res = "", i = 0; let so = Math.abs(n);
            while (so > 0) {
                let lop = so % 1000;
                if (lop > 0) {
                    let s = ""; let tr = Math.floor(lop/100), ch = Math.floor((lop%100)/10), dv = lop%10;
                    if (tr>0 || res!=="") s += chu[tr] + " trăm ";
                    if (ch==0 && dv!=0 && s!=="") s += "linh ";
                    if (ch>0) { s += (ch==1 ? "mười " : chu[ch] + " mươi "); }
                    if (dv>0) { if (dv==1 && ch>1) s += "mốt "; else if (dv==5 && ch>0) s += "lăm "; else s += chu[dv] + " "; }
                    res = s + units[i] + " " + res;
                }
                so = Math.floor(so/1000); i++;
            }
            return res.trim().charAt(0).toUpperCase() + res.trim().slice(1) + " đồng.";
        }
    </script>
</body>
