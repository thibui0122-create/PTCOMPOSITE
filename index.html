<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo Giá Pro - Phương Thanh Composite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');
        body { font-family: 'Roboto', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
        .a4-page { 
            width: 210mm; min-height: 296mm; padding: 10mm 15mm; 
            margin: 20px auto; background: white; box-shadow: 0 0 20px rgba(0,0,0,0.1);
            color: black; line-height: 1.4; position: relative;
        }
        @media print {
            body { background: white !important; }
            .no-print { display: none !important; }
            .a4-page { margin: 0 !important; padding: 10mm 15mm !important; width: 100% !important; box-shadow: none !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
        .table-custom { width: 100%; border-collapse: collapse; border: 1.5px solid black; margin-top: 10px; }
        .table-custom th, .table-custom td { border: 1.2px solid black !important; padding: 8px 10px; font-size: 13.5px; }
        .table-custom th { background-color: #eeeeee !important; font-weight: bold; text-transform: uppercase; }
        .input-clean { border: none; border-bottom: 1px solid #e2e8f0; outline: none; width: 100%; padding: 6px; background: transparent; transition: all 0.2s; }
        .input-clean:focus { border-bottom: 2px solid #2563eb; background: #f0f7ff; }
    </style>
</head>
<body>

    <nav class="bg-indigo-950 text-white p-3 sticky top-0 z-50 shadow-xl no-print flex justify-between items-center px-4 font-bold">
        <div class="text-xs tracking-widest uppercase">Phương Thanh Composite</div>
        <div class="flex gap-2">
            <button onclick="showSettings()" class="bg-indigo-800 px-3 py-1.5 rounded text-[10px]">⚙️ CÀI ĐẶT</button>
            <button onclick="toggleView('edit')" id="btn-back" class="hidden bg-slate-600 px-3 py-1.5 rounded text-[10px]">QUAY LẠI</button>
            <button onclick="toggleView('preview')" id="btn-go-preview" class="bg-blue-600 px-4 py-1.5 rounded text-[10px] shadow-lg shadow-blue-900/40">XEM & TẢI PDF</button>
        </div>
    </nav>

    <div id="edit-mode" class="max-w-4xl mx-auto p-4 space-y-6 no-print">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
            <h3 class="text-blue-700 font-black text-xs uppercase mb-4 border-b pb-2 flex items-center gap-2"><i class="fa-solid fa-user"></i> I. THÔNG TIN KHÁCH HÀNG</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="cust-name" placeholder="TÊN KHÁCH HÀNG (VIẾT HOA)" class="w-full border p-3 rounded-xl font-bold uppercase border-slate-200 focus:ring-2 focus:ring-blue-100 outline-none shadow-sm text-sm">
                <input type="date" id="quote-date" class="w-full border p-3 rounded-xl border-slate-200 outline-none text-sm shadow-sm">
                <input type="text" id="cust-addr" placeholder="Địa chỉ giao hàng..." class="w-full border p-3 rounded-xl border-slate-200 md:col-span-2 outline-none text-sm shadow-sm">
                <input type="text" id="cust-phone" placeholder="Số điện thoại / MST..." class="w-full border p-3 rounded-xl border-slate-200 md:col-span-2 outline-none text-sm shadow-sm">
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-4 bg-slate-50 border-b flex justify-between items-center px-6">
                <h3 class="text-blue-700 font-black text-xs uppercase">II. CHI TIẾT BÁO GIÁ</h3>
                <button onclick="addItem()" class="bg-indigo-600 text-white px-4 py-1.5 rounded-xl text-xs font-bold shadow-md">+ Thêm dòng</button>
            </div>
            <div id="items-list" class="p-6 space-y-4"></div>
            <div class="p-8 bg-indigo-50/50 border-t space-y-4 flex flex-col items-end">
                <div class="text-red-600 text-3xl font-black uppercase tracking-tighter text-right">
                    <span class="text-[10px] text-slate-500 mr-2 uppercase">Tổng thanh toán:</span>
                    <span id="sum-total">0</span> <span class="text-lg">VNĐ</span>
                </div>
                <p id="sum-words" class="text-right text-[12px] italic text-slate-500 font-bold max-w-md"></p>
            </div>
        </div>
    </div>

    <div id="preview-mode" class="hidden bg-slate-300 py-10 min-h-screen">
        <div class="max-w-[210mm] mx-auto mb-8 px-4 no-print">
            <button onclick="window.print()" class="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-2xl font-black shadow-xl flex flex-col items-center justify-center gap-1 transition-all active:scale-95">
                <span class="text-lg tracking-widest"><i class="fa-solid fa-file-pdf mr-2"></i> LƯU PDF VỀ MÁY</span>
                <span class="text-[10px] font-normal opacity-80">(Sau khi nhấn, chọn "In" -> "Lưu vào Tệp" hoặc "Zalo")</span>
            </button>
        </div>
        <div id="preview-a4" class="a4-page mx-auto shadow-2xl">
            <div id="preview-content"></div>
        </div>
    </div>

    <div id="modal-settings" class="fixed inset-0 bg-black/70 hidden z-[100] flex items-center justify-center p-4 no-print backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden font-bold">
            <div class="bg-indigo-950 text-white p-5 flex justify-between uppercase text-[10px] tracking-widest"><span>Cài đặt báo giá</span><button onclick="closeSettings()" class="text-2xl">&times;</button></div>
            <div class="p-6 space-y-3 text-sm bg-slate-50 overflow-y-auto max-h-[70vh]">
                <label class="text-[10px] text-slate-400 uppercase">Logo Công ty (Tải ảnh):</label>
                <input type="file" accept="image/*" onchange="uploadLogo(this)" class="w-full border p-2 rounded bg-white text-xs">
                <input type="text" id="set-name" placeholder="Tên Công Ty" class="w-full border p-3 rounded-xl bg-white shadow-sm">
                <input type="text" id="set-tax" placeholder="MST" class="w-full border p-3 rounded-xl bg-white shadow-sm">
                <input type="text" id="set-addr" placeholder="Trụ sở chính" class="w-full border p-3 rounded-xl bg-white shadow-sm">
                <input type="text" id="set-branch" placeholder="Chi nhánh" class="w-full border p-3 rounded-xl bg-white shadow-sm text-blue-700">
                <input type="text" id="set-phone" placeholder="Số điện thoại" class="w-full border p-3 rounded-xl bg-white shadow-sm">
                <input type="text" id="set-email" placeholder="Email" class="w-full border p-3 rounded-xl bg-white shadow-sm">
                <textarea id="set-bank" placeholder="Ngân hàng" rows="2" class="w-full border p-3 rounded-xl bg-white shadow-sm"></textarea>
                <input type="text" id="set-stk" placeholder="Số tài khoản" class="w-full border p-3 rounded-xl bg-white shadow-sm font-black text-blue-700">
                <input type="number" id="set-vat" placeholder="VAT (%)" class="w-full border p-3 rounded-xl bg-white shadow-sm">
                <input type="text" id="set-director" placeholder="Tên Giám đốc" class="w-full border p-3 rounded-xl bg-white shadow-sm font-black text-indigo-900 uppercase">
            </div>
            <div class="p-5 bg-white text-right border-t"><button onclick="saveSettings()" class="bg-indigo-900 text-white px-10 py-3 rounded-2xl uppercase text-xs font-black shadow-lg shadow-indigo-100">Cập nhật và Lưu lại</button></div>
        </div>
    </div>

    <script>
        const CATALOG = [
            { n: "Nhớt động cơ máy 2 thì", u: "Can", p: 525000 },
            { n: "Nhớt động cơ máy 4 thì", u: "Can", p: 683333 },
            { n: "Nhớt 4 thì - can 4 lít", u: "Can", p: 700000 },
            { n: "Nhớt hộp số 1 lít", u: "Can", p: 270000 },
            { n: "Ron ốc nhớt", u: "Cái", p: 30000 },
            { n: "Lọc xăng trong 4 thì", u: "Cái", p: 890000 },
            { n: "Lọc xăng ngoài", u: "Cái", p: 1500000 },
            { n: "Công thợ thay nhớt/bảo trì", u: "Công", p: 1200000 }
        ];

        let config = JSON.parse(localStorage.getItem('pt_config')) || {
            name: "CÔNG TY TNHH MTV PHƯƠNG THANH COMPOSITE",
            tax: "1702233007",
            addr: "506A, Ấp Tân Phước, Xã Châu Thành, Tỉnh An Giang",
            branch: "Đường Nguyễn Văn Cừ, Tổ 6, Khu Phố 4, Đặc Khu Phú Quốc, Tỉnh An Giang",
            phone: "0949.878.208 - 0942.959.263",
            email: "phuongthanhcomposite@gmail.com",
            bank: "Ngân hàng MB - Chi nhánh Rạch Giá, An Giang",
            stk: "242666686868",
            director: "BÙI NHỰT PHƯƠNG",
            vat: 8
        };
        let logoBase64 = localStorage.getItem('pt_logo_64') || "";
        let items = [{ id: 1, name: "Nhớt 4 thì - can 4 lít", unit: "Can", qty: 4, price: 700000 }];

        window.onload = () => {
            document.getElementById('quote-date').value = new Date().toISOString().split('T')[0];
            renderItems(); calculateAll();
        };

        function renderItems() {
            const list = document.getElementById('items-list');
            list.innerHTML = items.map(item => `
                <div class="border border-slate-200 p-5 rounded-2xl bg-white relative shadow-sm hover:border-blue-200 transition-all">
                    <button onclick="removeItem(${item.id})" class="absolute top-2 right-2 text-red-300 font-bold text-lg">&times;</button>
                    <select onchange="applyCatalog(${item.id}, this.value)" class="w-full text-[11px] font-black text-blue-700 bg-blue-50/50 p-2 mb-3 rounded-xl outline-none cursor-pointer uppercase">
                        <option value="">-- Click chọn hàng mẫu --</option>
                        ${CATALOG.map((c, i) => `<option value="${i}">${c.n} (${c.p.toLocaleString()}đ)</option>`).join('')}
                    </select>
                    <div class="grid grid-cols-12 gap-4">
                        <input type="text" value="${item.name}" oninput="updateItem(${item.id}, 'name', this.value)" class="col-span-12 md:col-span-5 input-clean font-bold text-slate-800 text-sm" placeholder="Tên sản phẩm">
                        <input type="text" value="${item.unit}" oninput="updateItem(${item.id}, 'unit', this.value)" class="col-span-4 md:col-span-2 input-clean text-center text-xs font-bold text-slate-400" placeholder="ĐVT">
                        <input type="number" value="${item.qty}" oninput="updateItem(${item.id}, 'qty', this.value)" class="col-span-3 md:col-span-2 input-clean text-center font-black text-blue-600 text-base" placeholder="SL">
                        <input type="text" value="${item.price.toLocaleString('vi-VN')}" oninput="updatePrice(${item.id}, this.value)" class="col-span-5 md:col-span-3 input-clean text-right font-black text-slate-900" placeholder="Giá">
                    </div>
                </div>
            `).join('');
        }

        function calculateAll() {
            let total = items.reduce((s, i) => s + (i.qty * i.price), 0);
            document.getElementById('sum-total').innerText = total.toLocaleString('vi-VN');
            document.getElementById('sum-words').innerText = "(Bằng chữ: " + docTien(total) + ")";
        }

        function docTien(so) {
            if (so === 0) return "Không đồng";
            const chuSo = ["không", "một", "hai", "ba", "bốn", "năm", "sáu", "bảy", "tám", "chín"];
            const hang = ["", "nghìn", "triệu", "tỷ"];
            function doc3(n, isFirst) {
                let tr = Math.floor(n/100), ch = Math.floor((n%100)/10), dv = n%10, s = "";
                if (tr>0 || !isFirst) s += chuSo[tr] + " trăm ";
                if (ch==0 && dv!=0 && s!=="") s += " linh ";
                if (ch==1) s += " mười "; else if (ch>1) s += chuSo[ch] + " mươi ";
                if (dv>0) { if (dv==1 && ch>1) s += " mốt "; else if (dv==5 && ch>0) s += " lăm "; else s += chuSo[dv] + " "; }
                return s;
            }
            let res = "", i = 0, temp = Math.abs(so);
            do { let lop = temp % 1000; if (lop > 0) { let s = doc3(lop, temp < 1000); res = s + hang[i] + " " + res; } temp = Math.floor(temp / 1000); i++; } while (temp > 0);
            return res.trim().charAt(0).toUpperCase() + res.trim().slice(1) + " đồng chẵn.";
        }

        function toggleView(mode) {
            const isPreview = mode === 'preview';
            if(isPreview) syncPreview();
            document.getElementById('edit-mode').classList.toggle('hidden', isPreview);
            document.getElementById('preview-mode').classList.toggle('hidden', !isPreview);
            document.getElementById('btn-go-preview').classList.toggle('hidden', isPreview);
            document.getElementById('btn-back').classList.toggle('hidden', !isPreview);
            window.scrollTo(0,0);
        }

        function syncPreview() {
            const d = new Date(document.getElementById('quote-date').value);
            const dStr = `Ngày ${d.getDate()} tháng ${d.getMonth()+1} năm ${d.getFullYear()}`;
            let total = items.reduce((s, i) => s + (i.qty * i.price), 0);

            document.getElementById('preview-content').innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <div style="width:145px;">${logoBase64 ? `<img src="${logoBase64}" style="width:100%;">` : `<div style="text-align:center; color:#ddd; font-weight:900; border:2px dashed #eee; padding:20px;">PHƯƠNG THANH</div>`}</div>
                    <div style="text-align:right; font-size:11.5px; line-height:1.4; color:#000;">
                        <h2 style="color:#cc0000; font-size:17.5px; font-weight:900; margin:0; letter-spacing:-0.5px;">${config.name}</h2>
                        <p style="margin:2px 0 0 0;">MST: ${config.tax}</p>
                        <p style="margin:0;">ĐC: ${config.addr}</p>
                        <p style="margin:0;">CN: ${config.branch}</p>
                        <p style="margin:1px 0 0 0;">Tel: <span style="color:#003399; font-weight:900;">${config.phone}</span></p>
                        <p style="margin:0;">Email: ${config.email}</p>
                    </div>
                </div>
                <div style="border-top:2.5px solid #cc0000; margin-bottom:15px;"></div>
                <h1 style="text-align:center; color:#003399; font-size:26px; font-weight:900; margin:0; letter-spacing:1px">BẢNG BÁO GIÁ</h1>
                <p style="text-align:center; font-style:italic; font-size:14px; margin-bottom:25px;">${dStr}</p>

                <div style="margin-bottom:15px; font-size:14.5px; line-height:1.6;">
                    <h3 style="color:#003399; font-weight:bold; margin-bottom:5px; font-size:13px; text-transform:uppercase; border-left:4px solid #003399; padding-left:10px;">I. THÔNG TIN KHÁCH HÀNG</h3>
                    <p style="margin:0;"><strong>Khách hàng:</strong> <span style="text-transform:uppercase; font-weight:900;">${document.getElementById('cust-name').value || "..."}</span></p>
                    <p style="margin:0;"><strong>Địa chỉ:</strong> ${document.getElementById('cust-addr').value || "..."}</p>
                    <p style="margin:0;"><strong>Điện thoại/MST:</strong> ${document.getElementById('cust-phone').value || "..."}</p>
                </div>

                <div style="margin-bottom:15px;">
                    <h3 style="color:#003399; font-weight:bold; margin-bottom:8px; font-size:13px; text-transform:uppercase; border-left:4px solid #003399; padding-left:10px;">II. CHI TIẾT BÁO GIÁ</h3>
                    <table class="table-custom">
                        <thead><tr><th style="width:40px;">STT</th><th style="text-align:left;">Tên hàng hóa / Quy cách</th><th style="width:65px;">ĐVT</th><th style="width:50px;">SL</th><th style="width:100px;">Đơn giá</th><th style="width:115px;">Thành tiền</th></tr></thead>
                        <tbody>
                            ${items.map((it, idx) => `<tr><td style="text-align:center;">${idx+1}</td><td style="font-weight:bold;">${it.name}</td><td style="text-align:center;">${it.unit}</td><td style="text-align:center; font-weight:bold;">${it.qty}</td><td style="text-align:right;">${it.price.toLocaleString('vi-VN')}</td><td style="text-align:right; font-weight:bold; color:#003399;">${(it.qty*it.price).toLocaleString('vi-VN')}</td></tr>`).join('')}
                        </tbody>
                    </table>
                </div>

                <div style="text-align:right; margin-bottom:25px;">
                    <h3 style="color:#cc0000; font-size:20px; font-weight:900; margin:0;">TỔNG CỘNG: ${total.toLocaleString('vi-VN')} VNĐ</h3>
                    <p style="font-style:italic; font-size:13px; margin:2px 0 0 0; color:#444;">(Bằng chữ: ${docTien(total)})</p>
                </div>

                <div style="display:flex; justify-content:space-between; font-size:13.5px; line-height:1.5;">
                    <div style="width:65%;">
                        <p style="font-weight:bold; text-decoration:underline;">Ghi chú & Điều khoản:</p>
                        <ul style="margin:5px 0; padding-left:18px; list-style-type:disc; color:#000;">
                            <li>Giá trên đã bao gồm ${config.vat}% VAT.</li>
                            <li>Thanh toán trước khi nhận hàng.</li>
                            <li>Báo giá có hiệu lực trong vòng 15 ngày.</li>
                        </ul>
                        <p style="font-weight:bold; margin-top:12px;">Thông tin chuyển khoản:</p>
                        <p style="margin:0; color:#444;">${config.bank}</p>
                        <p style="margin:0; color:#003399; font-weight:900; font-size:17px; letter-spacing:0.5px;">STK: ${config.stk}</p>
                        <p style="margin:0; font-weight:bold; text-transform:uppercase; color:#333;">${config.name}</p>
                    </div>
                    <div style="text-align:center; width:30%;">
                        <p style="font-style:italic;">${dStr}</p>
                        <p style="color:#003399; font-weight:900; font-size:16px; margin:5px 0 75px 0;">GIÁM ĐỐC</p>
                        <p style="font-weight:900; text-transform:uppercase; border-top:1px solid #000; padding-top:5px; min-width:160px; display:inline-block;">${config.director}</p>
                    </div>
                </div>
                <div style="text-align:center; margin-top:40px; font-style:italic; font-size:12px; border-top:1px dashed #ddd; padding-top:10px;">Xin chân thành cảm ơn Quý khách hàng!</div>
            `;
        }

        function addItem() { items.push({ id: Date.now(), name: "", unit: "Cái", qty: 1, price: 0 }); renderItems(); calculateAll(); }
        function removeItem(id) { if(items.length > 1) { items = items.filter(i => i.id !== id); renderItems(); calculateAll(); } }
        function updateItem(id, f, v) { const i = items.find(x => x.id === id); if(i) { i[f] = f === 'qty' ? (parseFloat(v)||0) : v; calculateAll(); } }
        function updatePrice(id, v) { const val = parseInt(v.replace(/\D/g, '')) || 0; const i = items.find(x => x.id === id); if(i) { i.price = val; calculateAll(); } }
        function applyCatalog(id, idx) { if(idx === "") return; const i = items.find(x => x.id === id); i.name = CATALOG[idx].n; i.unit = CATALOG[idx].u; i.price = CATALOG[idx].p; renderItems(); calculateAll(); }
        
        function showSettings() {
            ['name','tax','addr','branch','phone','email','bank','stk','vat','director'].forEach(k => document.getElementById('set-'+k).value = config[k]);
            document.getElementById('modal-settings').classList.remove('hidden');
        }
        function closeSettings() { document.getElementById('modal-settings').classList.add('hidden'); }
        function saveSettings() {
            ['name','tax','addr','branch','phone','email','bank','stk','vat','director'].forEach(k => config[k] = document.getElementById('set-'+k).value);
            localStorage.setItem('pt_config', JSON.stringify(config));
            closeSettings(); calculateAll();
        }
        function uploadLogo(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => { logoBase64 = e.target.result; localStorage.setItem('pt_logo_64', logoBase64); };
            if(file) reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
