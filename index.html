<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo Giá - Phương Thanh Composite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');
        body { font-family: 'Roboto', sans-serif; background-color: #f1f5f9; }
        .a4-page { 
            width: 210mm; min-height: 297mm; padding: 10mm 15mm; 
            margin: 20px auto; background: white; box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            .a4-page { margin: 0; box-shadow: none; width: 100%; padding: 10mm 15mm; }
        }
        table td, table th { border: 1px solid #1e293b !important; padding: 6px 8px; }
    </style>
</head>
<body>

    <nav class="bg-slate-800 text-white p-3 sticky top-0 z-50 shadow-md no-print flex justify-between items-center px-6">
        <div class="font-bold tracking-wider">PHƯƠNG THANH COMPOSITE</div>
        <div class="flex gap-3">
            <button onclick="showSettings()" class="bg-slate-600 px-3 py-1.5 rounded hover:bg-slate-500 text-xs uppercase font-bold"><i class="fa-solid fa-cog"></i> Cài đặt</button>
            <button onclick="toggleView('edit')" id="btn-back" class="hidden bg-slate-500 px-4 py-1.5 rounded text-xs font-bold uppercase">Quay lại</button>
            <button onclick="toggleView('preview')" id="btn-go-preview" class="bg-blue-600 hover:bg-blue-500 px-5 py-1.5 rounded text-xs font-black uppercase">Xem & Xuất PDF</button>
        </div>
    </nav>

    <div id="edit-mode" class="max-w-4xl mx-auto p-6 no-print space-y-6">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <h3 class="text-blue-700 font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-user"></i> THÔNG TIN KHÁCH HÀNG</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="cust-name" placeholder="Tên khách hàng" class="w-full border p-2.5 rounded-lg font-bold uppercase border-slate-300">
                <input type="date" id="quote-date" class="w-full border p-2.5 rounded-lg border-slate-300">
                <input type="text" id="cust-addr" placeholder="Địa chỉ" class="w-full border p-2.5 rounded-lg border-slate-300 md:col-span-2">
                <input type="text" id="cust-phone" placeholder="Điện thoại/MST" class="w-full border p-2.5 rounded-lg border-slate-300 md:col-span-2">
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
                <h3 class="text-blue-700 font-bold uppercase text-sm">Chi tiết báo giá</h3>
                <button onclick="addItem()" class="bg-blue-600 text-white px-4 py-1 rounded text-xs font-bold">+ Thêm dòng</button>
            </div>
            <div id="items-list" class="p-6 space-y-4"></div>
            <div class="p-6 bg-slate-50 border-t flex flex-col items-end gap-2 font-bold">
                <div class="text-slate-500">Cộng: <span id="sum-subtotal">0</span></div>
                <div class="text-red-600 text-2xl font-black uppercase tracking-tight">Tổng cộng: <span id="sum-total">0</span> VNĐ</div>
                <p id="sum-words" class="text-sm italic text-slate-500 font-normal"></p>
            </div>
        </div>
    </div>

    <div id="preview-mode" class="hidden py-10">
        <div class="max-w-[210mm] mx-auto mb-6 flex gap-4 px-4 no-print">
            <button onclick="window.print()" class="flex-1 bg-slate-800 text-white py-3 rounded font-bold shadow-lg uppercase tracking-wider"><i class="fa-solid fa-print"></i> In Báo Giá</button>
            <button onclick="exportPDF()" class="flex-1 bg-red-600 text-white py-3 rounded font-bold shadow-lg uppercase tracking-wider"><i class="fa-solid fa-file-pdf"></i> Xuất PDF</button>
        </div>
        <div id="preview-a4" class="a4-page mx-auto">
            <div id="preview-content"></div>
        </div>
    </div>

    <div id="modal-settings" class="fixed inset-0 bg-black/60 hidden z-[100] flex items-center justify-center p-4 no-print">
        <div class="bg-white rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden font-bold">
            <div class="bg-slate-800 text-white p-4 flex justify-between uppercase text-xs"><span>Cấu hình công ty</span><button onclick="closeSettings()">&times;</button></div>
            <div class="p-6 space-y-4 text-sm">
                <label class="block text-slate-500 uppercase text-[10px]">Logo (Ảnh URL hoặc Base64)</label>
                <input type="file" accept="image/*" onchange="uploadLogo(this)" class="w-full border p-2 rounded">
                <input type="text" id="set-name" placeholder="Tên Công Ty" class="w-full border p-2 rounded">
                <input type="text" id="set-tax" placeholder="MST" class="w-full border p-2 rounded">
                <input type="text" id="set-addr" placeholder="Địa chỉ chính" class="w-full border p-2 rounded">
                <input type="text" id="set-branch" placeholder="Địa chỉ chi nhánh" class="w-full border p-2 rounded">
                <input type="text" id="set-phone" placeholder="Số điện thoại" class="w-full border p-2 rounded">
                <input type="text" id="set-email" placeholder="Email" class="w-full border p-2 rounded">
                <textarea id="set-bank" placeholder="Thông tin ngân hàng" class="w-full border p-2 rounded"></textarea>
                <input type="text" id="set-stk" placeholder="Số tài khoản" class="w-full border p-2 rounded">
            </div>
            <div class="p-4 bg-slate-100 text-right"><button onclick="saveSettings()" class="bg-blue-600 text-white px-6 py-2 rounded">Lưu lại</button></div>
        </div>
    </div>

    <script>
        // --- DỮ LIỆU CẤU HÌNH ---
        let config = JSON.parse(localStorage.getItem('pt_config')) || {
            name: "CÔNG TY TNHH MTV PHƯƠNG THANH COMPOSITE",
            tax: "1702233007",
            addr: "506A, Ấp Tân Phước, Xã Châu Thành, Tỉnh An Giang",
            branch: "Đường Nguyễn Văn Cừ, Tổ 6, Khu Phố 4, Đặc Khu Phú Quốc, Tỉnh An Giang",
            phone: "0949.878.208 - 0942.959.263",
            email: "phuongthanhcomposite@gmail.com",
            bank: "Ngân hàng MB - Ngân hàng Quân đội, chi nhánh An Giang",
            stk: "242666686868",
            director: "BÙI NHỰT PHƯƠNG",
            vat: 10
        };
        let logoBase64 = localStorage.getItem('pt_logo_64') || "";
        let items = [{ id: 1, name: "Nhớt 4 thì - can 4 lít", unit: "Can", qty: 4, price: 700000 }];

        window.onload = () => {
            document.getElementById('quote-date').value = new Date().toISOString().split('T')[0];
            renderItems();
            calculateAll();
        };

        // --- HÀM ĐỌC SỐ TIỀN CHUẨN (FIX LỖI) ---
        function docTien(so) {
            if (so === 0) return "Không đồng";
            const chuSo = ["không", "một", "hai", "ba", "bốn", "năm", "sáu", "bảy", "tám", "chín"];
            const hang = ["", "nghìn", "triệu", "tỷ"];

            function doc3So(n, isFirst) {
                let tram = Math.floor(n / 100);
                let chuc = Math.floor((n % 100) / 10);
                let donVi = n % 10;
                let s = "";
                if (tram > 0 || !isFirst) s += chuSo[tram] + " trăm ";
                if (chuc === 0 && donVi !== 0 && s !== "") s += "linh ";
                if (chuc > 1) s += chuSo[chuc] + " mươi ";
                if (chuc === 1) s += "mười ";
                if (donVi > 0) {
                    if (donVi === 1 && chuc > 1) s += "mốt ";
                    else if (donVi === 5 && chuc > 0) s += "lăm ";
                    else s += chuSo[donVi] + " ";
                }
                return s;
            }

            let res = "", i = 0;
            let tempSo = Math.abs(so);
            do {
                let lop = tempSo % 1000;
                if (lop > 0) {
                    let s = doc3So(lop, tempSo < 1000);
                    res = s + hang[i] + " " + res;
                }
                tempSo = Math.floor(tempSo / 1000);
                i++;
            } while (tempSo > 0);
            
            res = res.trim();
            return res.charAt(0).toUpperCase() + res.slice(1) + " đồng chẵn.";
        }

        // --- XỬ LÝ GIAO DIỆN ---
        function renderItems() {
            const list = document.getElementById('items-list');
            list.innerHTML = items.map(item => `
                <div class="grid grid-cols-12 gap-3 items-end border-b pb-4">
                    <div class="col-span-6"><input type="text" value="${item.name}" oninput="updateItem(${item.id}, 'name', this.value)" class="w-full border-b font-bold outline-none" placeholder="Tên hàng hóa"></div>
                    <div class="col-span-2"><input type="text" value="${item.unit}" oninput="updateItem(${item.id}, 'unit', this.value)" class="w-full border-b text-center outline-none" placeholder="ĐVT"></div>
                    <div class="col-span-1"><input type="number" value="${item.qty}" oninput="updateItem(${item.id}, 'qty', this.value)" class="w-full border-b text-center outline-none font-bold"></div>
                    <div class="col-span-2"><input type="text" value="${item.price.toLocaleString()}" oninput="updatePrice(${item.id}, this.value)" class="w-full border-b text-right outline-none"></div>
                    <div class="col-span-1 text-right"><button onclick="removeItem(${item.id})" class="text-red-400">&times;</button></div>
                </div>
            `).join('');
        }

        function addItem() { items.push({ id: Date.now(), name: "", unit: "Cái", qty: 1, price: 0 }); renderItems(); calculateAll(); }
        function removeItem(id) { if(items.length > 1) { items = items.filter(i => i.id !== id); renderItems(); calculateAll(); } }
        function updateItem(id, f, v) { const i = items.find(x => x.id === id); if(i) { i[f] = (f==='qty') ? (parseInt(v)||0) : v; calculateAll(); } }
        function updatePrice(id, v) { const val = parseInt(v.replace(/\D/g, '')) || 0; const i = items.find(x => x.id === id); if(i) { i.price = val; calculateAll(); } }

        function calculateAll() {
            let total = items.reduce((s, i) => s + (i.qty * i.price), 0);
            document.getElementById('sum-subtotal').innerText = total.toLocaleString();
            document.getElementById('sum-total').innerText = total.toLocaleString();
            document.getElementById('sum-words').innerText = "(Bằng chữ: " + docTien(total) + ")";
        }

        function toggleView(mode) {
            const isPreview = mode === 'preview';
            if(isPreview) syncPreview();
            document.getElementById('edit-mode').classList.toggle('hidden', isPreview);
            document.getElementById('preview-mode').classList.toggle('hidden', !isPreview);
            document.getElementById('btn-go-preview').classList.toggle('hidden', isPreview);
            document.getElementById('btn-back').classList.toggle('hidden', !isPreview);
        }

        function syncPreview() {
            const d = new Date(document.getElementById('quote-date').value);
            const dStr = `Ngày ${d.getDate()} tháng ${d.getMonth()+1} năm ${d.getFullYear()}`;
            let total = items.reduce((s, i) => s + (i.qty * i.price), 0);

            document.getElementById('preview-content').innerHTML = `
                <div style="display:flex; justify-content:space-between; margin-bottom:20px; align-items:center;">
                    <div style="width:120px;">
                        ${logoBase64 ? `<img src="${logoBase64}" style="width:100%;">` : `<div style="text-align:center; color:#ddd; font-weight:900;">PHƯƠNG THANH</div>`}
                    </div>
                    <div style="text-align:right; font-size:12px; line-height:1.4;">
                        <h2 style="color:#cc0000; font-size:16px; font-weight:900; margin:0;">${config.name}</h2>
                        <p style="margin:0;">MST: ${config.tax}</p>
                        <p style="margin:0;">ĐC: ${config.addr}</p>
                        <p style="margin:0;">CN: ${config.branch}</p>
                        <p style="margin:0;">Tel: <span style="color:#003399; font-weight:bold;">${config.phone}</span></p>
                        <p style="margin:0;">Email: ${config.email}</p>
                    </div>
                </div>

                <div style="border-top:2px solid #cc0000; margin-bottom:20px;"></div>

                <h1 style="text-align:center; color:#003399; font-size:24px; font-weight:900; margin:0;">BẢNG BÁO GIÁ</h1>
                <p style="text-align:center; font-style:italic; font-size:14px; margin-bottom:25px;">${dStr}</p>

                <div style="margin-bottom:20px; font-size:14px; line-height:1.6;">
                    <h3 style="color:#003399; font-weight:bold; margin-bottom:5px;">I. THÔNG TIN KHÁCH HÀNG</h3>
                    <p><strong>Khách hàng:</strong> <span style="text-transform:uppercase;">${document.getElementById('cust-name').value}</span></p>
                    <p><strong>Địa chỉ:</strong> ${document.getElementById('cust-addr').value}</p>
                    <p><strong>Điện thoại/MST:</strong> ${document.getElementById('cust-phone').value}</p>
                </div>

                <div style="margin-bottom:20px; font-size:14px;">
                    <h3 style="color:#003399; font-weight:bold; margin-bottom:8px;">II. CHI TIẾT BÁO GIÁ</h3>
                    <table style="width:100%; border-collapse:collapse; font-size:13px;">
                        <tr style="background-color:#f1f5f9; font-weight:bold; text-align:center;">
                            <td>STT</td>
                            <td>Tên hàng hóa / Quy cách</td>
                            <td>ĐVT</td>
                            <td>SL</td>
                            <td>Đơn giá</td>
                            <td>Thành tiền</td>
                        </tr>
                        ${items.map((it, idx) => `
                            <tr>
                                <td style="text-align:center;">${idx+1}</td>
                                <td style="font-weight:bold;">${it.name}</td>
                                <td style="text-align:center;">${it.unit}</td>
                                <td style="text-align:center;">${it.qty}</td>
                                <td style="text-align:right;">${it.price.toLocaleString()}</td>
                                <td style="text-align:right; font-weight:bold;">${(it.qty*it.price).toLocaleString()}</td>
                            </tr>
                        `).join('')}
                    </table>
                </div>

                <div style="text-align:right; margin-bottom:25px;">
                    <h3 style="color:#cc0000; font-size:18px; font-weight:900; margin:0;">TỔNG CỘNG: ${total.toLocaleString()} VNĐ</h3>
                    <p style="font-style:italic; font-size:13px; margin:5px 0 0 0;">(Bằng chữ: ${docTien(total)})</p>
                </div>

                <div style="display:flex; justify-content:space-between; font-size:13px; line-height:1.5;">
                    <div>
                        <p style="font-weight:bold; text-decoration:underline;">Ghi chú & Điều khoản:</p>
                        <ul style="margin:0; padding-left:15px; list-style-type:disc;">
                            <li>Giá trên đã bao gồm ${config.vat}% VAT.</li>
                            <li>Thanh toán trước khi nhận hàng.</li>
                            <li>Báo giá có hiệu lực 15 ngày.</li>
                        </ul>
                        <p style="font-weight:bold; margin-top:10px;">Thông tin chuyển khoản:</p>
                        <p style="margin:0;">${config.bank}</p>
                        <p style="margin:0; color:#003399; font-weight:bold; font-size:15px;">STK: ${config.stk}</p>
                        <p style="margin:0; text-transform:uppercase;">${config.name}</p>
                    </div>
                    <div style="text-align:center; width:200px;">
                        <p style="font-style:italic;">${dStr}</p>
                        <p style="color:#003399; font-weight:bold; font-size:16px; margin:5px 0 60px 0;">GIÁM ĐỐC</p>
                        <p style="font-weight:bold; text-transform:uppercase;">${config.director}</p>
                        <p style="font-style:italic; font-size:11px; color:#666;">(Ký và đóng dấu)</p>
                    </div>
                </div>

                <p style="text-align:center; font-style:italic; font-size:13px; margin-top:40px;">Xin chân thành cảm ơn Quý khách hàng!</p>
            `;
        }

        // --- CÀI ĐẶT ---
        function uploadLogo(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                logoBase64 = e.target.result;
                localStorage.setItem('pt_logo_64', logoBase64);
            };
            reader.readAsDataURL(file);
        }

        function showSettings() {
            document.getElementById('set-name').value = config.name;
            document.getElementById('set-tax').value = config.tax;
            document.getElementById('set-addr').value = config.addr;
            document.getElementById('set-branch').value = config.branch;
            document.getElementById('set-phone').value = config.phone;
            document.getElementById('set-email').value = config.email;
            document.getElementById('set-bank').value = config.bank;
            document.getElementById('set-stk').value = config.stk;
            document.getElementById('modal-settings').classList.remove('hidden');
        }

        function closeSettings() { document.getElementById('modal-settings').classList.add('hidden'); }

        function saveSettings() {
            config = {
                name: document.getElementById('set-name').value,
                tax: document.getElementById('set-tax').value,
                addr: document.getElementById('set-addr').value,
                branch: document.getElementById('set-branch').value,
                phone: document.getElementById('set-phone').value,
                email: document.getElementById('set-email').value,
                bank: document.getElementById('set-bank').value,
                stk: document.getElementById('set-stk').value,
                director: "BÙI NHỰT PHƯƠNG",
                vat: 10
            };
            localStorage.setItem('pt_config', JSON.stringify(config));
            closeSettings();
        }

        function exportPDF() {
            const docDef = {
                content: [{ text: 'BÁO GIÁ PHƯƠNG THANH', fontSize: 20 }],
                defaultStyle: { font: 'Roboto' }
            };
            pdfMake.createPdf(docDef).download("Bao_Gia_Phuong_Thanh.pdf");
        }
    </script>
</body>
</html>
