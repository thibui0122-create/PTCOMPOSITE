<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo Giá Pro - Phương Thanh Composite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');
        body { font-family: 'Roboto', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; }
        
        /* Cấu hình tờ giấy A4 */
        .a4-page { 
            width: 210mm; min-height: 297mm; padding: 10mm 15mm; 
            margin: 20px auto; background: white; box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative; overflow: hidden;
        }

        /* Khi In hoặc Xuất PDF */
        @media print {
            body { background: white !important; padding: 0 !important; margin: 0 !important; }
            .no-print { display: none !important; }
            .a4-page { 
                margin: 0 !important; padding: 10mm 15mm !important; 
                width: 100% !important; box-shadow: none !important;
                min-height: auto !important;
            }
            html, body { height: auto; }
        }

        /* Kẻ bảng đen sắc nét y như mẫu ảnh */
        .table-custom { width: 100%; border-collapse: collapse; border: 1.5px solid black; }
        .table-custom th, .table-custom td { border: 1px solid black !important; padding: 6px 8px; font-size: 13px; color: black; }
        .table-custom th { background-color: #f2f2f2 !important; font-weight: bold; text-transform: uppercase; -webkit-print-color-adjust: exact; }

        .input-clean { border: none; border-bottom: 1px solid #ddd; outline: none; width: 100%; padding: 4px; background: transparent; }
        .input-clean:focus { border-bottom: 2px solid #003399; }
    </style>
</head>
<body>

    <nav class="bg-slate-900 text-white p-3 sticky top-0 z-50 shadow-lg no-print flex justify-between items-center px-4">
        <div class="font-bold text-xs uppercase tracking-tighter">Phương Thanh Composite</div>
        <div class="flex gap-2">
            <button onclick="showSettings()" class="bg-slate-700 px-3 py-1.5 rounded text-[10px] font-bold uppercase">⚙️ Cài đặt</button>
            <button onclick="toggleView('edit')" id="btn-back" class="hidden bg-slate-600 px-3 py-1.5 rounded text-[10px] font-bold uppercase">Sửa tiếp</button>
            <button onclick="toggleView('preview')" id="btn-go-preview" class="bg-blue-600 hover:bg-blue-500 px-4 py-1.5 rounded text-[10px] font-black uppercase shadow-lg">XEM & XUẤT PDF</button>
        </div>
    </nav>

    <div id="edit-mode" class="max-w-4xl mx-auto p-4 space-y-4 no-print">
        <div class="bg-white rounded-xl shadow p-5 border border-slate-200">
            <h3 class="text-blue-700 font-black text-[10px] uppercase mb-4 tracking-widest"><i class="fa-solid fa-user"></i> Thông tin khách hàng</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="cust-name" placeholder="Tên khách hàng (Anh Thành...)" class="w-full border p-2.5 rounded-lg font-bold uppercase text-sm">
                <input type="date" id="quote-date" class="w-full border p-2.5 rounded-lg text-sm">
                <input type="text" id="cust-addr" placeholder="Địa chỉ..." class="w-full border p-2.5 rounded-lg text-sm md:col-span-2">
                <input type="text" id="cust-phone" placeholder="Điện thoại / MST..." class="w-full border p-2.5 rounded-lg text-sm md:col-span-2">
            </div>
        </div>

        <div class="bg-white rounded-xl shadow border border-slate-200 overflow-hidden">
            <div class="p-3 bg-slate-50 border-b flex justify-between items-center px-5">
                <h3 class="text-blue-700 font-black text-[10px] uppercase">Chi tiết báo giá</h3>
                <button onclick="addItem()" class="bg-blue-600 text-white px-3 py-1 rounded-lg text-[10px] font-bold">+ Thêm dòng</button>
            </div>
            <div id="items-list" class="p-4 space-y-4"></div>
            <div class="p-6 bg-blue-50/50 border-t flex flex-col items-end">
                <div class="text-red-600 text-2xl font-black uppercase"><span class="text-xs mr-2 text-slate-500">Tổng cộng:</span> <span id="sum-total">0</span> VNĐ</div>
                <p id="sum-words" class="text-[11px] italic text-slate-500 mt-1"></p>
            </div>
        </div>
    </div>

    <div id="preview-mode" class="hidden min-h-screen">
        <div class="max-w-4xl mx-auto mb-6 flex gap-4 px-4 pt-6 no-print">
            <button onclick="window.print()" class="flex-1 bg-red-600 text-white py-4 rounded-2xl font-black uppercase shadow-xl active:scale-95">
                <i class="fa-solid fa-file-pdf mr-2"></i> NHẤN ĐỂ LƯU PDF / GỬI ZALO
            </button>
        </div>
        <div id="preview-a4" class="a4-page mx-auto">
            <div id="preview-content"></div>
        </div>
    </div>

    <div id="modal-settings" class="fixed inset-0 bg-black/60 hidden z-[100] flex items-center justify-center p-4 no-print">
        <div class="bg-white rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden font-bold">
            <div class="bg-slate-900 text-white p-4 flex justify-between uppercase text-[10px] tracking-widest"><span>Cấu hình công ty</span><button onclick="closeSettings()">&times;</button></div>
            <div class="p-6 space-y-3 text-sm bg-slate-50 overflow-y-auto max-h-[70vh]">
                <input type="file" accept="image/*" id="input-logo" class="w-full border p-2 rounded text-xs bg-white">
                <input type="text" id="set-name" placeholder="Tên Công Ty" class="w-full border p-2.5 rounded">
                <input type="text" id="set-tax" placeholder="MST" class="w-full border p-2.5 rounded">
                <input type="text" id="set-addr" placeholder="Địa chỉ chính" class="w-full border p-2.5 rounded">
                <input type="text" id="set-branch" placeholder="Địa chỉ chi nhánh" class="w-full border p-2.5 rounded">
                <input type="text" id="set-phone" placeholder="Số điện thoại" class="w-full border p-2.5 rounded">
                <input type="text" id="set-email" placeholder="Email" class="w-full border p-2.5 rounded">
                <textarea id="set-bank" placeholder="Thông tin ngân hàng" class="w-full border p-2.5 rounded"></textarea>
                <input type="text" id="set-stk" placeholder="Số tài khoản" class="w-full border p-2.5 rounded font-black text-blue-700">
                <input type="number" id="set-vat" placeholder="Thuế VAT (%)" class="w-full border p-2.5 rounded">
                <input type="text" id="set-director" placeholder="Tên Giám đốc" class="w-full border p-2.5 rounded font-black uppercase text-blue-800">
            </div>
            <div class="p-4 bg-white text-right border-t"><button onclick="saveSettings()" class="bg-blue-600 text-white px-8 py-2 rounded-lg font-black text-xs uppercase">LƯU LẠI</button></div>
        </div>
    </div>

    <script>
        const CATALOG = [
            { n: "Nhớt động cơ máy 2 thì", u: "Can", p: 525000 },
            { n: "Nhớt động cơ máy 4 thì", u: "Can", p: 683333 },
            { n: "Nhớt 4 thì - can 4 lít", u: "Can", p: 700000 },
            { n: "Nhớt hộp số 1 lít", u: "Can", p: 270000 },
            { n: "Ron ốc nhớt", u: "Cái", p: 30000 },
            { n: "Lọc xăng ngoài", u: "Cái", p: 1500000 },
            { n: "Công thợ thay nhớt/bảo trì", u: "Công", p: 1200000 }
        ];

        let config = JSON.parse(localStorage.getItem('pt_config')) || {
            name: "CÔNG TY TNHH MTV PHƯƠNG THANH COMPOSITE",
            tax: "1702233007",
            addr: "506A, Ấp Tân Phước, Xã Châu Thành, Tỉnh An Giang",
            branch: "Đường Nguyễn Văn Cừ, Tổ 6, Khu Phố 4, Đặc Khu Phú Quốc, Tỉnh An Giang",
            phone: "0949.878.208 - 0942.959.263",
            email: "phuongthanhcomposite@gmail.com",
            bank: "Ngân hàng MB - Ngân hàng Quân đội, chi nhánh Rạch Giá, An Giang",
            stk: "242666686868",
            director: "BÙI NHỰT PHƯƠNG",
            vat: 10
        };
        let logoBase64 = localStorage.getItem('pt_logo_64') || "";
        let items = [{ id: 1, name: "Nhớt 4 thì - can 4 lít", unit: "Can", qty: 4, price: 700000 }];

        window.onload = () => {
            document.getElementById('quote-date').value = new Date().toISOString().split('T')[0];
            renderItems();
            calculateAll();
        };

        function renderItems() {
            const list = document.getElementById('items-list');
            list.innerHTML = items.map(item => `
                <div class="border border-slate-200 p-4 rounded-2xl bg-white relative shadow-sm">
                    <button onclick="removeItem(${item.id})" class="absolute top-1 right-2 text-red-400 font-bold">&times;</button>
                    <div class="flex items-center gap-2 mb-3 bg-blue-50 p-1.5 rounded-lg border border-blue-100">
                        <select onchange="applyCatalog(${item.id}, this.value)" class="w-full text-[11px] font-bold text-blue-700 bg-transparent outline-none">
                            <option value="">-- Chọn hàng mẫu từ danh mục --</option>
                            ${CATALOG.map((c, i) => `<option value="${i}">${c.n} (${c.p.toLocaleString()}đ)</option>`).join('')}
                        </select>
                    </div>
                    <div class="grid grid-cols-12 gap-3">
                        <input type="text" value="${item.name}" oninput="updateItem(${item.id}, 'name', this.value)" class="col-span-12 md:col-span-5 input-clean font-bold text-sm" placeholder="Tên sản phẩm">
                        <input type="text" value="${item.unit}" oninput="updateItem(${item.id}, 'unit', this.value)" class="col-span-4 md:col-span-2 input-clean text-center text-xs" placeholder="ĐVT">
                        <input type="number" value="${item.qty}" oninput="updateItem(${item.id}, 'qty', this.value)" class="col-span-3 md:col-span-2 input-clean text-center font-black text-blue-600">
                        <input type="text" value="${item.price.toLocaleString('vi-VN')}" oninput="updatePrice(${item.id}, this.value)" class="col-span-5 md:col-span-3 input-clean text-right font-black">
                    </div>
                </div>
            `).join('');
        }

        function calculateAll() {
            let total = items.reduce((s, i) => s + (i.qty * i.price), 0);
            document.getElementById('sum-total').innerText = total.toLocaleString('vi-VN');
            document.getElementById('sum-words').innerText = "(Bằng chữ: " + docTien(total) + ")";
        }

        function docTien(so) {
            if (so === 0) return "Không đồng";
            const chuSo = ["không", "một", "hai", "ba", "bốn", "năm", "sáu", "bảy", "tám", "chín"];
            const hang = ["", "nghìn", "triệu", "tỷ"];
            function doc3So(n, isFirst) {
                let tram = Math.floor(n / 100);
                let chuc = Math.floor((n % 100) / 10);
                let donVi = n % 10;
                let s = "";
                if (tram > 0 || !isFirst) s += chuSo[tram] + " trăm ";
                if (chuc === 0 && donVi !== 0 && s !== "") s += " linh ";
                if (chuc === 1) s += " mười "; else if (chuc > 1) s += chuSo[chuc] + " mươi ";
                if (donVi > 0) {
                    if (donVi === 1 && chuc > 1) s += " mốt "; else if (donVi === 5 && chuc > 0) s += " lăm "; else s += chuSo[donVi] + " ";
                }
                return s;
            }
            let res = "", i = 0, temp = Math.abs(so);
            do { let lop = temp % 1000; if (lop > 0) { let s = doc3So(lop, temp < 1000); res = s + hang[i] + " " + res; } temp = Math.floor(temp / 1000); i++; } while (temp > 0);
            return res.trim().charAt(0).toUpperCase() + res.trim().slice(1) + " đồng chẵn.";
        }

        function applyCatalog(id, idx) {
            if(idx === "") return;
            const i = items.find(x => x.id === id);
            i.name = CATALOG[idx].n; i.unit = CATALOG[idx].u; i.price = CATALOG[idx].p;
            renderItems(); calculateAll();
        }

        function addItem() { items.push({ id: Date.now(), name: "", unit: "Cái", qty: 1, price: 0 }); renderItems(); calculateAll(); }
        function removeItem(id) { if(items.length > 1) { items = items.filter(i => i.id !== id); renderItems(); calculateAll(); } }
        function updateItem(id, f, v) { const i = items.find(x => x.id === id); if(i) { i[f] = f === 'qty' ? (parseFloat(v)||0) : v; calculateAll(); } }
        function updatePrice(id, v) { const val = parseInt(v.replace(/\D/g, '')) || 0; const i = items.find(x => x.id === id); if(i) { i.price = val; calculateAll(); } }

        function toggleView(mode) {
            const isPreview = mode === 'preview';
            if(isPreview) syncPreview();
            document.getElementById('edit-mode').classList.toggle('hidden', isPreview);
            document.getElementById('preview-mode').classList.toggle('hidden', !isPreview);
            document.getElementById('btn-go-preview').classList.toggle('hidden', isPreview);
            document.getElementById('btn-back').classList.toggle('hidden', !isPreview);
            window.scrollTo(0,0);
        }

        function syncPreview() {
            const d = new Date(document.getElementById('quote-date').value);
            const dStr = `Ngày ${d.getDate()} tháng ${d.getMonth()+1} năm ${d.getFullYear()}`;
            let total = items.reduce((s, i) => s + (i.qty * i.price), 0);

            document.getElementById('preview-content').innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <div style="width:130px;">${logoBase64 ? `<img src="${logoBase64}" style="width:100%;">` : `<b>PHƯƠNG THANH</b>`}</div>
                    <div style="text-align:right; font-size:11px; line-height:1.4;">
                        <h2 style="color:#cc0000; font-size:16px; font-weight:900; margin:0;">${config.name}</h2>
                        <p style="margin:0;">MST: ${config.tax}</p>
                        <p style="margin:0;">ĐC: ${config.addr}</p>
                        <p style="margin:0;">CN: ${config.branch}</p>
                        <p style="margin:0; font-weight:bold;">Hotline: <span style="color:#003399;">${config.phone}</span></p>
                        <p style="margin:0;">Email: ${config.email}</p>
                    </div>
                </div>
                <div style="border-top:2px solid #cc0000; margin-bottom:15px;"></div>
                <h1 style="text-align:center; color:#003399; font-size:24px; font-weight:900; margin:0;">BẢNG BÁO GIÁ</h1>
                <p style="text-align:center; font-style:italic; font-size:13px; margin-bottom:20px;">${dStr}</p>
                <div style="margin-bottom:15px; font-size:14px; line-height:1.6;">
                    <p><strong>Khách hàng:</strong> <span style="text-transform:uppercase; font-weight:bold;">${document.getElementById('cust-name').value || "..."}</span></p>
                    <p><strong>Địa chỉ:</strong> ${document.getElementById('cust-addr').value || "..."}</p>
                    <p><strong>Điện thoại/MST:</strong> ${document.getElementById('cust-phone').value || "..."}</p>
                </div>
                <table class="table-custom">
                    <thead><tr><th>STT</th><th style="text-align:left;">Tên hàng hóa / Quy cách</th><th>ĐVT</th><th>SL</th><th>Đơn giá</th><th>Thành tiền</th></tr></thead>
                    <tbody>
                        ${items.map((it, idx) => `<tr><td style="text-align:center;">${idx+1}</td><td style="font-weight:bold;">${it.name}</td><td style="text-align:center;">${it.unit}</td><td style="text-align:center; font-weight:bold;">${it.qty}</td><td style="text-align:right;">${it.price.toLocaleString('vi-VN')}</td><td style="text-align:right; font-weight:bold; color:#003399;">${(it.qty*it.price).toLocaleString('vi-VN')}</td></tr>`).join('')}
                    </tbody>
                </table>
                <div style="text-align:right; margin:15px 0 20px 0;">
                    <h3 style="color:#cc0000; font-size:19px; font-weight:900; margin:0;">TỔNG CỘNG: ${total.toLocaleString('vi-VN')} VNĐ</h3>
                    <p style="font-style:italic; font-size:12px; margin:0;">(Bằng chữ: ${docTien(total)})</p>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:13px; line-height:1.5;">
                    <div style="width:65%;">
                        <p style="font-weight:bold; text-decoration:underline;">Ghi chú & Điều khoản:</p>
                        <ul style="margin:5px 0; padding-left:15px; list-style-type:disc;">
                            <li>Giá trên đã bao gồm ${config.vat}% VAT.</li>
                            <li>Thanh toán trước khi nhận hàng.</li>
                            <li>Báo giá có hiệu lực trong vòng 15 ngày.</li>
                        </ul>
                        <p style="font-weight:bold; margin-top:10px;">Thông tin chuyển khoản:</p>
                        <p style="margin:0;">${config.bank}</p>
                        <p style="margin:0; color:#003399; font-weight:bold; font-size:16px;">STK: ${config.stk}</p>
                        <p style="margin:0; font-weight:bold; text-transform:uppercase;">${config.name}</p>
                    </div>
                    <div style="text-align:center; width:30%;">
                        <p style="font-style:italic;">${dStr}</p>
                        <p style="color:#003399; font-weight:900; font-size:15px; margin:5px 0 60px 0;">GIÁM ĐỐC</p>
                        <p style="font-weight:bold; text-transform:uppercase;">${config.director}</p>
                        <p style="font-style:italic; font-size:10px; color:#666;">(Ký tên và đóng dấu)</p>
                    </div>
                </div>
                <div style="text-align:center; margin-top:35px; font-style:italic; font-size:12px; border-top:1px dashed #ddd; padding-top:10px;">Xin chân thành cảm ơn Quý khách hàng!</div>
            `;
        }

        function showSettings() {
            document.getElementById('set-name').value = config.name;
            document.getElementById('set-tax').value = config.tax;
            document.getElementById('set-addr').value = config.addr;
            document.getElementById('set-branch').value = config.branch;
            document.getElementById('set-phone').value = config.phone;
            document.getElementById('set-email').value = config.email;
            document.getElementById('set-bank').value = config.bank;
            document.getElementById('set-stk').value = config.stk;
            document.getElementById('set-vat').value = config.vat;
            document.getElementById('set-director').value = config.director;
            document.getElementById('modal-settings').classList.remove('hidden');
        }
        function closeSettings() { document.getElementById('modal-settings').classList.add('hidden'); }
        function saveSettings() {
            config = {
                name: document.getElementById('set-name').value, tax: document.getElementById('set-tax').value,
                addr: document.getElementById('set-addr').value, branch: document.getElementById('set-branch').value,
                phone: document.getElementById('set-phone').value, email: document.getElementById('set-email').value,
                bank: document.getElementById('set-bank').value, stk: document.getElementById('set-stk').value,
                vat: document.getElementById('set-vat').value, director: document.getElementById('set-director').value
            };
            localStorage.setItem('pt_config', JSON.stringify(config));
            closeSettings(); calculateAll();
        }
        function uploadLogo(input) {
            const file = document.getElementById('input-logo').files[0];
            const reader = new FileReader();
            reader.onload = (e) => { logoBase64 = e.target.result; localStorage.setItem('pt_logo_64', logoBase64); };
            if(file) reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
